---
name: Reusable Build
on:
  workflow_call:
    inputs:
      upload_artifacts:
        description: 'Upload ISOs as job artifacts'
        type: boolean
        default: false
      upload_r2:
        description: 'Upload ISOs to Cloudflare R2'
        type: boolean
        default: true

env:
  IMAGE_REGISTRY: "ghcr.io/ublue-os"
  IMAGE_NAME: "aurora"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISOs
    runs-on: ${{ matrix.platform == 'amd64' && 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64]
        flavor: ["main", "nvidia-open"]
        image_version: ["stable"]
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10

      - name: Checkout common repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: get-aurora-dev/common
          path: common

      - name: Setup Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3

      - name: Check Just Syntax
        shell: bash
        run: |
          just check

      - name: Format image ref
        id: image_ref
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          set -eoux pipefail
          image_name=$(just image_name "aurora" "${{ matrix.image_version}}" "${{ matrix.flavor}}")
          image_ref="${IMAGE_REGISTRY}/${image_name}"
          KARGS="NONE"
          echo "image_ref=$image_ref" >> "${GITHUB_OUTPUT}"
          echo "artifact_format="$image_name-${{ matrix.image_version }}-webui-$(uname -m)"" >> "${GITHUB_OUTPUT}"
          echo "kargs=$KARGS" >> "${GITHUB_OUTPUT}"

      - name: Generate titanoboa-compatible file list
        id: flatpak_list
        run: |
          set -eoux pipefail
          FILE_LIST="$(mktemp)"
          cat common/system_files/shared/usr/share/ublue-os/homebrew/system-flatpaks.Brewfile | grep -v '#' | grep -F -e "flatpak" | sed 's/flatpak //' | tr -d '"' | tee "${FILE_LIST}"
          echo "file_list_path=${FILE_LIST}" | tee "${GITHUB_OUTPUT}"

      - name: Build ISO
        id: build
        uses: ublue-os/titanoboa@840217d97bd0bc9a52466508c54d8dda5c5ba2fd
        with:
          image-ref: ${{ steps.image_ref.outputs.image_ref }}:${{ matrix.image_version }}
          flatpaks-list: ${{ steps.flatpak_list.outputs.file_list_path }}
          hook-post-rootfs: ${{ github.workspace }}/iso_files/configure_iso_anaconda.sh
          kargs: ${{ steps.image_ref.outputs.kargs }}

      - name: Rename ISO
        id: rename
        env:
          OUTPUT_PATH: ${{ steps.build.outputs.iso-dest }}
          FLAVOR: ${{ matrix.flavor }}
          OUTPUT_NAME: ${{ steps.image_ref.outputs.artifact_format }}
          IMAGE_VERSION: ${{ matrix.image_version }}
        run: |
          set -x
          mkdir -p output
          OUTPUT_DIRECTORY="$(realpath output)"
          mv "${OUTPUT_PATH}" "${OUTPUT_DIRECTORY}/${OUTPUT_NAME}.iso"
          (cd "${OUTPUT_DIRECTORY}" && sha256sum "${OUTPUT_NAME}.iso" | tee "${OUTPUT_NAME}.iso-CHECKSUM")
          echo "output_directory=$OUTPUT_DIRECTORY" >> "${GITHUB_OUTPUT}"

      - name: Generate Torrent File
        env:
          OUTPUT_DIRECTORY: ${{ steps.rename.outputs.output_directory }}
          OUTPUT_NAME: ${{ steps.image_ref.outputs.artifact_format }}
          IMAGE_VERSION: ${{ matrix.image_version }}
          FLAVOR: ${{ matrix.flavor }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -eoux pipefail

          sudo apt-get install -y mktorrent

          BUILD_DATE=$(date -u +%Y-%m-%d)

          cd "${OUTPUT_DIRECTORY}"
          mktorrent \
            -a udp://tracker.opentrackr.org:1337/announce \
            -a udp://open.tracker.cl:1337/announce \
            -a udp://open.demonii.com:1337/announce \
            -a udp://tracker.openbittorrent.com:6969/announce \
            -a udp://exodus.desync.com:6969/announce \
            -a udp://tracker.torrent.eu.org:451/announce \
            -a udp://tracker.moeking.me:6969/announce \
            -a https://tracker.gbitt.info:443/announce \
            -a https://tracker.tamersunion.org:443/announce \
            -a wss://tracker.btorrent.xyz \
            -a wss://tracker.openwebtorrent.com \
            -w "https://download.getaurora.dev/${OUTPUT_NAME}.iso" \
            -c "Aurora ${IMAGE_VERSION} ${FLAVOR} (${PLATFORM}) - ${BUILD_DATE}" \
            -o "${OUTPUT_NAME}.iso.torrent" \
            "${OUTPUT_NAME}.iso"

          sha256sum "${OUTPUT_NAME}.iso.torrent" | tee "${OUTPUT_NAME}.iso.torrent-CHECKSUM"

      - name: Upload to Job Artifacts
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ steps.image_ref.outputs.artifact_format }}
          if-no-files-found: error
          path: ${{ steps.rename.outputs.output_directory }}

      - name: Install rclone
        if: inputs.upload_r2
        run: /home/linuxbrew/.linuxbrew/bin/brew install rclone

      - name: Upload to CloudFlare test bucket
        if: inputs.upload_r2
        shell: bash
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.AURORA_DL_TEST_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.AURORA_DL_TEST_R2_ACCESS_KEY_SECRET }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.AURORA_DL_TEST_R2_ENDPOINT }}
          SOURCE_DIR: ${{ steps.rename.outputs.output_directory }}
        run: |
          /home/linuxbrew/.linuxbrew/bin/rclone copy --log-level INFO --checksum "${SOURCE_DIR}" R2:aurora-dl-test

  create-prerelease:
    name: Create GitHub Prerelease
    needs: build
    if: inputs.upload_r2
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.AURORA_DL_TEST_R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.AURORA_DL_TEST_R2_ACCESS_KEY_SECRET }}
      RCLONE_CONFIG_R2_REGION: auto
      RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.AURORA_DL_TEST_R2_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install rclone
        run: /home/linuxbrew/.linuxbrew/bin/brew install rclone

      - name: Download Torrent Files from R2
        run: |
          set -eoux pipefail
          mkdir -p torrents
          /home/linuxbrew/.linuxbrew/bin/rclone copy R2:aurora-dl-test torrents \
            --include "*.iso.torrent" \
            --include "*.iso.torrent-CHECKSUM" \
            --log-level INFO

          echo "Downloaded torrent files:"
          ls -lh torrents/

          if [ -z "$(ls torrents/*.torrent 2>/dev/null)" ]; then
            echo "No torrent files found in R2 testing bucket"
            exit 1
          fi

      - name: Determine Release Version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eoux pipefail
          YEAR_MONTH=$(date -u +%y.%m)

          if gh release view "${YEAR_MONTH}" >/dev/null 2>&1; then
            PATCH=1
            while gh release view "${YEAR_MONTH}.${PATCH}" >/dev/null 2>&1; do
              PATCH=$((PATCH + 1))
            done
            VERSION="${YEAR_MONTH}.${PATCH}"
          else
            VERSION="${YEAR_MONTH}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -eoux pipefail

          TORRENT_LIST=""
          for f in torrents/*.torrent torrents/*.torrent-CHECKSUM; do
            [ -f "$f" ] && TORRENT_LIST="${TORRENT_LIST} ${f}"
          done

          gh release create "${VERSION}" \
            --prerelease \
            --title "Aurora ISOs ${VERSION} (Prerelease)" \
            --notes "$(cat <<'EOF'
          ## ⚠️ Prerelease - Testing Builds

          These ISOs are automatically generated from successful builds and uploaded to the **testing** bucket.

          **Status**: Not yet promoted to production
          **For**: Testing and validation only

          Once validated, these builds can be promoted to production using the promotion workflow.

          ### How to Download

          1. Download a `.torrent` file below
          2. Open with a BitTorrent client (qBittorrent, Transmission, etc.)
          3. Torrents include web seeds -- downloads work immediately

          ### Direct Downloads

          ISOs are also available at https://docs.getaurora.dev/guides/iso-testing

          ### Verify

          \`\`\`bash
          sha256sum -c <filename>.torrent-CHECKSUM
          \`\`\`
          EOF
          )" \
            ${TORRENT_LIST}
